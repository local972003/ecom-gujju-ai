<!DOCTYPE html>
<html>
<head>
  <title>Ecom Gujju AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center">

<!-- Glass Card -->
<div class="relative bg-white/70 backdrop-blur-xl border border-gray-200 p-8 rounded-3xl shadow-2xl w-[700px]">

  <!-- Title -->
  <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">
    ✨ Ecom Gujju AI
  </h1>

  <!-- Upload -->
  <input type="file" id="image"
    class="w-full p-3 rounded-lg bg-white border border-gray-300 text-gray-800 mb-4">

  <!-- Button -->
  <button onclick="uploadImage()"
    class="w-full py-3 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 text-white hover:scale-105 transition transform shadow-lg">
    🚀 Analyze Product
  </button>
  <!-- Loader Overlay -->
<div id="loaderOverlay"
  class="hidden absolute inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center rounded-3xl">

  <div class="flex flex-col items-center">
    
    <!-- Spinner -->
    <div class="w-16 h-16 border-4 border-gray-400 border-t-blue-500 rounded-full animate-spin"></div>
    
    <p class="mt-4 text-gray-300">Analyzing Image...</p>
  </div>

</div>

  <!-- Output -->
  <div id="output" class="mt-6 space-y-4"></div>

  <!-- Loader -->
  <div id="loaderOverlay"
    class="hidden absolute inset-0 bg-white/70 backdrop-blur-md flex items-center justify-center rounded-3xl">

    <div class="flex flex-col items-center">
      <div class="w-16 h-16 border-4 border-gray-300 border-t-blue-500 rounded-full animate-spin"></div>
      <p class="mt-4 text-gray-600">Analyzing Image...</p>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
