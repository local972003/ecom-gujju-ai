<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl w-[650px] shadow-2xl">

  <h1 class="text-2xl mb-6 text-center text-blue-400">
    AI Product Analyzer
  </h1>

  <input type="file" id="image"
    class="mb-4 w-full bg-black/30 p-2 rounded">

  <button onclick="uploadImage()"
    class="bg-blue-500 hover:bg-blue-600 w-full py-3 rounded-lg">
    Analyze Product
  </button>

  <div id="output" class="mt-6 space-y-4"></div>

</div>

<script src="app.js"></script>
</body>
</html>
